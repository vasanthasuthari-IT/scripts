version: 0.2

# Builds docker/jenkins/Dockerfile and pushes to ECR.
# ECR_REPO_URI and AWS_DEFAULT_REGION are set as environment variables on
# the CodeBuild project (terraform/ecs/main.tf) — never hardcode the
# account ID here, this sandbox account rotates periodically.

phases:
  pre_build:
    commands:
      - echo Logging in to ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI
  build:
    commands:
      - echo Building Docker image for linux/amd64...
      - docker build --platform linux/amd64 -t $ECR_REPO_URI:latest docker/jenkins/
  post_build:
    commands:
      - echo Pushing image...
      - docker push $ECR_REPO_URI:latest
