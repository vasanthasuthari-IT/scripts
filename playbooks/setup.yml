---
# =============================================================================
# setup.yml — baseline setup for all EC2 instances
#
# Usage:
#   ansible-playbook -i inventory/aws_ec2.yml playbooks/setup.yml
#   ansible-playbook -i inventory/aws_ec2.yml playbooks/setup.yml --limit vm_rundeck
# =============================================================================

- name: Baseline setup
  hosts: all
  become: true

  tasks:

    - name: Install common packages
      ansible.builtin.yum:
        name:
          - vim
          - curl
          - wget
          - net-tools
          - git
          - htop
          - unzip
        state: present

    - name: Set timezone to UTC
      ansible.builtin.command: timedatectl set-timezone UTC
      changed_when: false

    - name: Print host info
      ansible.builtin.debug:
        msg: "Host: {{ inventory_hostname }} | IP: {{ ansible_host }}"
